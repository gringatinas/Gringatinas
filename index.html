  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, Helvetica, sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      background: radial-gradient(circle at top, #1f2937, #020617);
      color:#fff;
    }

    .container{
      width:100%;
      max-width:420px;
      text-align:center;
      padding:25px;
    }

    .badge{
      font-size:14px;
      color:#ff4d4d;
      margin-bottom:10px;
      letter-spacing:1px;
    }

    h1{
      font-size:22px;
      margin-bottom:20px;
    }

    .btn{
      display:block;
      width:100%;
      padding:16px;
      margin-bottom:15px;
      border-radius:14px;
      text-decoration:none;
      font-weight:bold;
      font-size:16px;
      transition:0.3s;
    }

    /* Botão principal (neon Telegram) */
    .primary{
      background: linear-gradient(45deg, #229ED9, #38bdf8);
      box-shadow: 0 0 15px rgba(34,158,217,0.6);
      color:#fff;
    }

    .primary:hover{
      transform:scale(1.03);
      box-shadow: 0 0 25px rgba(34,158,217,0.9);
    }

    /* Botão secundário */
    .secondary{
      background: linear-gradient(45deg, #334155, #1e293b);
      color:#cbd5f5;
      box-shadow: 0 0 10px rgba(0,0,0,0.5);
    }

    .secondary:hover{
      transform:scale(1.03);
      background: linear-gradient(45deg, #475569, #334155);
    }

    .info{
      font-size:13px;
      color:#94a3b8;
      margin-top:10px;
    }
