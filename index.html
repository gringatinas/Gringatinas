  <style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}

body{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background: radial-gradient(circle at top, #020617, #000);
  color:#fff;
}

.container{
  width:100%;
  max-width:420px;
  padding:25px;
  text-align:center;
  animation:fade .5s ease;
}

@keyframes fade{
  from{opacity:0;transform:translateY(15px);}
  to{opacity:1;transform:translateY(0);}
}

.badge{
  font-size:12px;
  color:#ff4d4d;
  margin-bottom:6px;
  letter-spacing:1px;
}

h1{
  font-size:22px;
  margin-bottom:8px;
}

.sub{
  font-size:14px;
  color:#94a3b8;
  margin-bottom:18px;
}

.btn{
  display:block;
  width:100%;
  padding:16px;
  border-radius:14px;
  text-decoration:none;
  font-weight:800;
  font-size:16px;
  margin-bottom:12px;
  transition:.2s;
}

/* principal */
.primary{
  background:linear-gradient(45deg,#229ED9,#38bdf8);
  color:#fff;
  animation:pulse 1.6s infinite;
}

@keyframes pulse{
  0%{box-shadow:0 0 8px rgba(34,158,217,.3);}
  50%{box-shadow:0 0 22px rgba(34,158,217,.9);}
  100%{box-shadow:0 0 8px rgba(34,158,217,.3);}
}

/* secundário */
.secondary{
  background:#1e293b;
  color:#cbd5f5;
}

.btn:active{
  transform:scale(0.97);
}

.counter{
  font-size:13px;
  color:#22c55e;
  margin-top:10px;
}

.loading{
  font-size:12px;
  color:#64748b;
  margin-top:6px;
}
</style>

</head>

<body>

<div class="container">

  <div class="badge">ACESSO DISPONÍVEL</div>

  <h1>Entrar no Telegram</h1>

  <div class="sub">Atualizado recentemente</div>

  <a href="https://t.me/flixhubot?start=Instagram" class="btn primary" onclick="vibrate()">
    🌟 Acessar principal
  </a>

  <a href="https://t.me/baixarendagratiss" class="btn secondary">
    Ver prévias
  </a>

  <div class="counter" id="counter">● 127 pessoas acessando agora</div>

  <div class="loading">Escolha uma opção acima</div>

</div>

<script>
function vibrate(){
  if(navigator.vibrate){
    navigator.vibrate(50);
  }
}

function updateCounter(){
  let num = Math.floor(Math.random()*40) + 110;
  document.getElementById("counter").innerText =
    "● " + num + " pessoas acessando agora";
}

setInterval(updateCounter, 3000);
</script>

</body>
</html>
