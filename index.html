<script>
!function(f,b,e,v,n,t,s){
if(f.fbq)return;
n=f.fbq=function(){
n.callMethod?
n.callMethod.apply(n,arguments):n.queue.push(arguments)
};
if(!f._fbq)f._fbq=n;
n.push=n;
n.loaded=!0;
n.version='2.0';
n.queue=[];
t=b.createElement(e);
t.async=!0;
t.src=v;
s=b.getElementsByTagName(e)[0];
s.parentNode.insertBefore(t,s)
}(window,document,'script','https://connect.facebook.net/en_US/fbevents.js');

const e1=Date.now().toString();

fbq('init','1548214903316952');

fbq('track','PageView',{},{eventID:e1});

fbq('track','ViewContent',{
content_name:'Access',
content_category:'Content'
},{eventID:e1});

function g(n){
let m=document.cookie.match(new RegExp('(^| )'+n+'=([^;]+)'));
if(m)return m[2];
}

const p=new URLSearchParams(window.location.search);

const a=p.get('fbclid');
const b=p.get('utm_source');
const c=p.get('utm_campaign');
const d=p.get('utm_content');
const e=p.get('utm_term');

if(a){

localStorage.setItem('fbclid',a);

const f='fb.1.'+Date.now()+'.'+a;

document.cookie=`_fbc=${f}; path=/; max-age=7776000`;

localStorage.setItem('_fbc',f);

}

const h=g('_fbp');

if(h){
localStorage.setItem('_fbp',h);
}

if(b)localStorage.setItem('utm_source',b);
if(c)localStorage.setItem('utm_campaign',c);
if(d)localStorage.setItem('utm_content',d);
if(e)localStorage.setItem('utm_term',e);

fbq('trackCustom','DeviceData',{
sw:window.screen.width,
sh:window.screen.height,
lg:navigator.language,
pf:navigator.platform
});

setTimeout(()=>{
fbq('trackCustom','EngagedUser',{t:15});
},15000);

let s1=false;

window.addEventListener('scroll',()=>{

if(!s1&&window.scrollY>250){

s1=true;

fbq('trackCustom','ScrollDepth',{
d:'50%'
});

}

});

let i1=false;

document.addEventListener('click',()=>{

if(!i1){

i1=true;

fbq('trackCustom','UserInteraction');

}

});

document.addEventListener('visibilitychange',()=>{

if(document.visibilityState==='hidden'){
fbq('trackCustom','PageHidden');
}

if(document.visibilityState==='visible'){
fbq('trackCustom','PageVisible');
}

});

window.addEventListener('beforeunload',()=>{
fbq('trackCustom','ExitIntent');
});

function v(){

if(navigator.vibrate){
navigator.vibrate(50);
}

}

function x(t){

v();

const e2=Date.now().toString();

fbq(
'track',
'Lead',
{
cn:'Access',
bc:t,
ts:localStorage.getItem('utm_source')||'',
cp:localStorage.getItem('utm_campaign')||'',
fb:localStorage.getItem('fbclid')||''
},
{
eventID:e2
}
);

fbq(
'track',
'InitiateCheckout',
{
cn:t,
pf:'tg'
},
{
eventID:e2
}
);

fbq('trackCustom','Click',{
b:t,
fbc:localStorage.getItem('_fbc')||'',
fbp:localStorage.getItem('_fbp')||''
});

}

function u(){

let n=Math.floor(Math.random()*40)+110;

document.getElementById('c').innerText=
'● '+n+' pessoas acessando agora';

}

setInterval(u,3000);

</script>
