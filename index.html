<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#0f172a;
  font-family:Arial, Helvetica, sans-serif;
  color:#ffffff;
}

.box{
  width:100%;
  max-width:420px;
  padding:30px;
  text-align:center;
}

.loader{
  width:52px;
  height:52px;
  margin:0 auto 20px;
  border:4px solid rgba(255,255,255,.18);
  border-top:4px solid #3b82f6;
  border-radius:50%;
  animation:spin 1s linear infinite;
}

p{
  font-size:18px;
  line-height:1.5;
  margin-bottom:22px;
  opacity:.95;
}

.btn{
  display:inline-block;
  padding:14px 30px;
  background:#3b82f6;
  color:#ffffff;
  text-decoration:none;
  border-radius:12px;
  font-size:16px;
  font-weight:700;
  transition:background .25s ease, transform .25s ease;
}

.btn:hover{
  background:#2563eb;
  transform:translateY(-2px);
}

.btn:active{
  transform:translateY(0);
}

@keyframes spin{
  to{
    transform:rotate(360deg);
  }
}
</style>
</head>

<body>

<div class="box">
  <div class="loader"></div>
  <p>Clique no botão abaixo para continuar</p>
  <a class="btn" href="https://t.me/yasmimsilxa_bot" target="_blank" rel="noopener noreferrer">
    Acessar agora
  </a>
</div>

</body>
