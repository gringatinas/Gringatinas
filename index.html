<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Redirecionando...</title>

<script>
!function(f,b,e,v,n,t,s){
if(f.fbq)return;
n=f.fbq=function(){n.callMethod?
n.callMethod.apply(n,arguments):n.queue.push(arguments)};
if(!f._fbq)f._fbq=n;
n.push=n;
n.loaded=!0;
n.version='2.0';
n.queue=[];
t=b.createElement(e);
t.async=!0;
t.src=v;
s=b.getElementsByTagName(e)[0];
s.parentNode.insertBefore(t,s);
}(window,document,'script','https://connect.facebook.net/en_US/fbevents.js');

fbq('init','1548214903316952');

const eventID=Date.now().toString();

fbq('track','PageView',{},{
eventID:eventID
});

fbq('track','ViewContent',{
content_name:'Preview Redirect',
content_category:'Telegram'
},{
eventID:eventID
});

const url=new URLSearchParams(location.search);

const fbclid=url.get('fbclid');

if(fbclid){

const fbc='fb.1.'+Date.now()+'.'+fbclid;

document.cookie="_fbc="+fbc+";path=/;max-age=7776000";

localStorage.setItem('_fbc',fbc);

localStorage.setItem('fbclid',fbclid);

}

function cookie(n){

const m=document.cookie.match(new RegExp('(^| )'+n+'=([^;]+)'));

return m?m[2]:'';

}

const fbp=cookie('_fbp');

if(fbp) localStorage.setItem('_fbp',fbp);

fbq('track','Lead',{
cn:'Preview',
fb:localStorage.getItem('fbclid')||''
},{
eventID:Date.now().toString()
});

fbq('track','InitiateCheckout',{
pf:'telegram'
},{
eventID:Date.now().toString()
});

setTimeout(function(){

location.replace("https://t.me/baixarendabrasil");

},500);

</script>

<noscript>
<meta http-equiv="refresh" content="0;url=https://t.me/baixarendabrasil">
</noscript>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#000;
color:#fff;
}

.box{
text-align:center;
}

.loader{
width:54px;
height:54px;
border:5px solid rgba(255,255,255,.2);
border-top:5px solid #229ED9;
border-radius:50%;
animation:g .8s linear infinite;
margin:auto auto 20px;
}

@keyframes g{
100%{
transform:rotate(360deg);
}
}

h2{
font-size:22px;
margin-bottom:8px;
}

p{
color:#9ca3af;
font-size:14px;
}

</style>

</head>

<body>

<div class="box">

<div class="loader"></div>

<h2>Redirecionando...</h2>

<p>Aguarde alguns instantes.</p>

</div>

</body>
</html>
