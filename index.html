<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carregando...</title>

<meta http-equiv="refresh" content="1;url=https://t.me/yasmimsilxa_bot">

<script>
setTimeout(function () {
  window.location.href = "https://t.me/yasmimsilxa_bot";
}, 1000);
</script>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#0f172a;
  font-family:Arial, sans-serif;
  color:#fff;
}

.box{
  text-align:center;
  padding:30px;
  width:100%;
  max-width:420px;
}

.loader{
  width:50px;
  height:50px;
  border:4px solid rgba(255,255,255,.2);
  border-top:4px solid #3b82f6;
  border-radius:50%;
  margin:0 auto 20px;
  animation:spin 1s linear infinite;
}

p{
  font-size:18px;
  opacity:.9;
  margin-bottom:20px;
}

.btn{
  display:inline-block;
  padding:14px 28px;
  background:#3b82f6;
  color:#fff;
  text-decoration:none;
  border-radius:12px;
  font-weight:700;
  transition:.3s;
}

.btn:hover{
  background:#2563eb;
}

@keyframes spin{
  to{transform:rotate(360deg);}
}
</style>
</head>
<body>

<div class="box">
  <div class="loader"></div>
  <p>Redirecionando...</p>
  <a href="https://t.me/yasmimsilxa_bot" class="btn">Acessar agora</a>
</div>

</body>
</html>
